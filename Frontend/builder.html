<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Builder - VibeKit Studio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>
    <div class="builder-container">
        <!-- Sidebar -->
        <div class="builder-sidebar">
            <div class="builder-header">
                <a href="dashboard.html" class="builder-back">
                    <i class="bi bi-arrow-left"></i>
                </a>
                <div>
                    <h5 class="mb-0 fw-bold" id="page-title-display">Page Builder</h5>
                    <small class="text-muted" id="page-slug-display">/p/my-page</small>
                </div>
            </div>

            <div class="builder-tabs">
                <div class="builder-tab active" data-tab="content">
                    <i class="bi bi-pencil me-2"></i>Content
                </div>
                <div class="builder-tab" data-tab="style">
                    <i class="bi bi-palette me-2"></i>Style
                </div>
            </div>

            <div class="builder-content">
                <!-- Content Tab -->
                <div id="tab-content">
                    <div class="builder-section">
                        <div class="builder-section-title">Profile</div>
                        <div class="mb-3">
                            <label class="form-label">Name</label>
                            <input type="text" class="form-control content-input" id="content-name" placeholder="Your Name">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Title / Tagline</label>
                            <input type="text" class="form-control content-input" id="content-title" placeholder="Web Developer & Designer">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Bio</label>
                            <textarea class="form-control content-input" id="content-bio" rows="3" placeholder="Write a short bio about yourself..."></textarea>
                        </div>
                    </div>

                    <div class="builder-section">
                        <div class="builder-section-title">Social Links</div>
                        <div class="mb-3">
                            <label class="form-label"><i class="bi bi-twitter me-2"></i>Twitter</label>
                            <input type="url" class="form-control content-input" id="content-twitter" placeholder="https://twitter.com/username">
                        </div>
                        <div class="mb-3">
                            <label class="form-label"><i class="bi bi-github me-2"></i>GitHub</label>
                            <input type="url" class="form-control content-input" id="content-github" placeholder="https://github.com/username">
                        </div>
                        <div class="mb-3">
                            <label class="form-label"><i class="bi bi-linkedin me-2"></i>LinkedIn</label>
                            <input type="url" class="form-control content-input" id="content-linkedin" placeholder="https://linkedin.com/in/username">
                        </div>
                        <div class="mb-3">
                            <label class="form-label"><i class="bi bi-globe me-2"></i>Website</label>
                            <input type="url" class="form-control content-input" id="content-website" placeholder="https://yourwebsite.com">
                        </div>
                    </div>

                    <div class="builder-section">
                        <div class="builder-section-title">Call to Action</div>
                        <div class="mb-3">
                            <label class="form-label">Button Text</label>
                            <input type="text" class="form-control content-input" id="content-cta-text" placeholder="Get in Touch">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Button Link</label>
                            <input type="url" class="form-control content-input" id="content-cta-link" placeholder="mailto:you@example.com">
                        </div>
                    </div>

                    <div class="builder-section">
                        <div class="builder-section-title">Contact Form</div>
                        <div class="form-check form-switch">
                            <input class="form-check-input content-input" type="checkbox" id="content-show-contact">
                            <label class="form-check-label" for="content-show-contact">Enable Contact Form</label>
                        </div>
                    </div>
                </div>

                <!-- Style Tab -->
                <div id="tab-style" style="display: none;">
                    <div class="builder-section">
                        <div class="builder-section-title">Choose Your Vibe</div>
                        <div class="vibe-selector">
                            <div class="vibe-option" data-vibe="minimalist">
                                <div class="vibe-option-preview" style="background: #ffffff; border: 1px solid #e2e8f0;"></div>
                                <div class="vibe-option-name">Minimalist</div>
                            </div>
                            <div class="vibe-option" data-vibe="bold">
                                <div class="vibe-option-preview" style="background: linear-gradient(135deg, #dc2626, #ea580c);"></div>
                                <div class="vibe-option-name">Bold</div>
                            </div>
                            <div class="vibe-option" data-vibe="retro">
                                <div class="vibe-option-preview" style="background: #fef3c7;"></div>
                                <div class="vibe-option-name">Retro</div>
                            </div>
                            <div class="vibe-option" data-vibe="glass">
                                <div class="vibe-option-preview" style="background: linear-gradient(135deg, #667eea, #764ba2);"></div>
                                <div class="vibe-option-name">Glassmorphism</div>
                            </div>
                            <div class="vibe-option" data-vibe="dark">
                                <div class="vibe-option-preview" style="background: #0f172a;"></div>
                                <div class="vibe-option-name">Dark Mode</div>
                            </div>
                            <div class="vibe-option" data-vibe="playful">
                                <div class="vibe-option-preview" style="background: linear-gradient(135deg, #ec4899, #8b5cf6);"></div>
                                <div class="vibe-option-name">Playful</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="builder-actions">
                <button class="btn btn-outline-secondary flex-fill" id="btn-save">
                    <i class="bi bi-save me-2"></i>Save Draft
                </button>
                <button class="btn btn-primary flex-fill" id="btn-publish">
                    <i class="bi bi-globe me-2"></i>Publish
                </button>
            </div>
        </div>

        <!-- Preview -->
        <div class="builder-preview">
            <div class="preview-frame">
                <iframe id="preview-iframe" src="about:blank"></iframe>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/builder.js"></script>
</body>
</html>
