<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-meta-title">VibeKit Page</title>
    <meta name="description" id="page-meta-description" content="">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/vibes.css" rel="stylesheet">
</head>
<body id="page-body" class="vibe-minimalist">
    <div class="page-container" id="page-container">
        <div class="page-content" id="page-content">
            <!-- Profile Section -->
            <div class="profile-avatar" id="profile-avatar">
                <i class="bi bi-person"></i>
            </div>
            
            <h1 class="profile-name" id="profile-name">Your Name</h1>
            <p class="profile-title" id="profile-title">Your Title</p>
            <p class="profile-bio" id="profile-bio">Your bio goes here...</p>

            <!-- Social Links -->
            <div class="social-links" id="social-links">
                <!-- Populated by JS -->
            </div>

            <!-- CTA Button -->
            <div class="cta-section" id="cta-section" style="display: none;">
                <a href="#" class="cta-button" id="cta-button">Get in Touch</a>
            </div>

            <!-- Contact Form -->
            <div class="contact-form-section" id="contact-form-section" style="display: none;">
                <h3 class="contact-form-title">Get in Touch</h3>
                <form id="contact-form">
                    <div class="mb-3">
                        <input type="text" class="form-control" id="contact-name" placeholder="Your Name" required>
                    </div>
                    <div class="mb-3">
                        <input type="email" class="form-control" id="contact-email" placeholder="Your Email" required>
                    </div>
                    <div class="mb-3">
                        <textarea class="form-control" id="contact-message" rows="4" placeholder="Your Message" required></textarea>
                    </div>
                    <button type="submit" class="btn cta-button w-100">Send Message</button>
                </form>
                <div id="contact-success" class="alert alert-success mt-3" style="display: none;">
                    Message sent successfully! Thank you for reaching out.
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="page-footer">
            Built with <a href="/">VibeKit Studio</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/page.js"></script>
</body>
</html>
